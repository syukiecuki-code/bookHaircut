<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Haircut</title>
    <style>
        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            background-color: #0f172a;
            min-height: 100vh;
        }
         div {
            margin: 20px;
            background-color: #334155;
            height: auto;
            width: auto;
            border-radius: 50px;
            padding: 40px;
            border: 0px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-group{
            box-shadow: 0 0 0 0;
            margin: 0px;
            padding: 10px;
        }
        label{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        button{
            padding: 10px;
            margin-top:20px;
            background-color: #89ade4;
            border-radius: 6px;
            width: 100%;
            font-weight: 400;
        }

        button:hover{
            background-color: #adc1e0;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, .3);
            
        }
    </style>
</head>
<body>
    <div>
        <h1>Book an Appointment</h1>
        <form action="https://script.google.com/macros/s/AKfycbzT7di4IxRaYaGm7VoMFgpKHJYEa7SG9TAZdJewZl4mRcmHJ-rTuWecgBReye5vR1yHWw/exec" method="POST">
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="customer_name" required>
            </div>
            <div class="form-group">
                <label for="phone">Number Phone:</label>
                <input type="text" id="phone" name="no_phone" required>
            </div>
            <div class="form-group">
                <label for="date">Appointment Date:</label>
                <input type="datetime-local" id="date" name="appointment_date" required>
            </div>
            <button type="submit" onclick="option">Confirm Booking</button>
            
        </form>
    </div>
</body>

</html>
